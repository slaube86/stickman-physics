<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stickman Physics – Jump & Run</title>
  <link rel="stylesheet" href="style.css?v=18">
</head>
<body>
  <div id="game-container">
    <canvas id="gameCanvas" width="800" height="400"></canvas>

    <!-- HUD Overlay -->
    <div id="hud">
      <span id="score-display">Score: 0</span>
      <button id="btn-mute" class="hud-btn">🔊</button>
      <span id="level-display">Level 1</span>
    </div>

    <!-- Lernkarten Overlay -->
    <div id="learn-card" class="hidden">
      <div class="card-content">
        <span class="card-icon"></span>
        <h2 class="card-title"></h2>
        <p class="card-text"></p>
        <div class="card-actions">
          <button class="card-play">&#9654; Vorlesen</button>
          <button class="card-btn">Weiter</button>
        </div>
      </div>
    </div>

  </div>

  <!-- Touch Controls – AUSSERHALB des game-containers -->
  <div id="touch-controls">
    <div id="touch-dpad">
      <button id="btn-left" class="touch-btn touch-dir">◀</button>
      <button id="btn-right" class="touch-btn touch-dir">▶</button>
    </div>
    <div id="touch-action">
      <button id="btn-levels" class="touch-btn touch-small">≡</button>
      <button id="btn-reset" class="touch-btn touch-reset">↺</button>
      <button id="btn-jump" class="touch-btn touch-jump">▲</button>
    </div>
  </div>

  <script type="module" src="game.js?v=18"></script>
</body>
</html>
